<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecArena | POV-MAX Broadcast Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Changa', sans-serif; background: transparent; overflow: hidden; width: 1920px; height: 1080px; }
        
        /* Tactical black void panels */
        .glass-dark {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }

        /* Continuous neon green border on the outer edges */
        .neon-g-side { border-left: 5px solid #39FF14; box-shadow: -10px 0 20px rgba(57, 255, 20, 0.3); }
        .neon-g-side-right { border-right: 5px solid #39FF14; box-shadow: 10px 0 20px rgba(57, 255, 20, 0.3); }

        /* Central merged line */
        .merge-line { width: 4px; background: rgba(255, 255, 255, 0.05); }

        /* Ticker pulse */
        .pulse-text { animation: pulse-animation 2s infinite alternate; }
        @keyframes pulse-animation { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body class="relative">

    <div class="absolute top-0 w-full flex justify-between items-center px-12 pt-6 pointer-events-none">
        <div class="glass-dark p-5 rounded-r-2xl neon-g-side">
            <h1 class="text-white text-3xl font-extrabold tracking-tighter">REC<span class="text-[#39FF14]">ARENA</span></h1>
            <p class="text-[10px] text-white/50 uppercase tracking-[0.3em]">POV-MAX ACTIVATED</p>
        </div>
        
        <div class="glass-dark px-10 py-3 rounded-full flex items-center gap-4 border border-white/5">
            <div class="w-4 h-4 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_red]"></div>
            <span class="text-white font-extrabold tracking-widest uppercase text-base">Broadcast Live</span>
        </div>
        <div class="w-64"></div>
    </div>

    <div class="absolute inset-0 flex items-center justify-center pointer-events-none mt-16 px-4">
        
        <div class="w-[1880px] h-[529px] flex items-stretch border-2 border-white/5 rounded-xl shadow-[0_0_80px_rgba(0,0,0,0.7)] relative bg-black/10">
            
            <div class="w-full h-full relative border-r-2 border-white/5">
                <div class="absolute inset-0 bg-transparent rounded-l-xl"></div>
                <div class="absolute bottom-3 left-3 px-3 py-1 bg-black/60 text-[10px] text-white/60 border border-white/10 uppercase tracking-widest">Player 1 POV // SIGNAL</div>
            </div>

            <div class="w-full h-full relative">
                <div class="absolute inset-0 bg-transparent rounded-r-xl"></div>
                <div class="absolute bottom-3 right-3 px-3 py-1 bg-black/60 text-[10px] text-white/60 border border-white/10 uppercase tracking-widest">Player 2 POV // SIGNAL</div>
            </div>

        </div>

    </div>

    <div class="absolute bottom-0 left-0 w-full px-12 pb-6 flex justify-between items-end text-sm uppercase tracking-[0.2em] font-medium pointer-events-none">
        
        <div class="glass-dark px-6 py-2 rounded-l-xl neon-g-side">
             Powered by <span class="text-white/90">RecShop BD</span>
        </div>
        
        <div class="glass-dark px-8 py-1 rounded-t-lg text-[11px] text-[#39FF14]/80 uppercase tracking-[0.4em] pulse-text">
            ARCHITECTING BD ESPORTS INFRASTRUCTURE
        </div>

        <div class="glass-dark px-6 py-2 rounded-r-xl neon-g-side-right">
             Dev by <span class="text-white/90">Recbuilder</span>
        </div>
    </div>

</body>
</html>
