<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecArena | Standalone Broadcast Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background: transparent; 
            overflow: hidden; 
            width: 1920px; 
            height: 1080px; 
        }
        .glass-panel {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-text {
            color: #39FF14;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }
        .neon-border-g { border-bottom: 3px solid #39FF14; }
        .neon-border-b { border-bottom: 3px solid #00E5FF; }
        
        /* Animated pulse for the "LIVE" status */
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body class="relative">

    <div class="absolute top-0 left-0 w-full flex justify-between items-start px-12 pt-6">
        <div class="glass-panel p-4 rounded-xl border-l-4 border-[#39FF14]">
             <h2 class="text-white text-xl font-bold tracking-tighter">REC<span class="neon-text">ARENA</span></h2>
             <p class="text-[10px] text-white/50 uppercase tracking-[0.3em]">RecShop Official</p>
        </div>

        <div class="glass-panel px-10 py-2 rounded-full flex items-center gap-4">
            <div class="w-3 h-3 bg-red-600 rounded-full pulse"></div>
            <span class="text-white font-bold tracking-widest uppercase text-sm">Live Tournament</span>
        </div>

        <div class="glass-panel p-4 rounded-xl border-r-4 border-[#00E5FF] text-right">
            <h2 class="text-white text-xl font-bold tracking-tighter">PRO<span class="text-[#00E5FF]">SERIES</span></h2>
            <p id="match_id" class="text-[10px] text-white/50 uppercase tracking-[0.3em]">Slot #001</p>
        </div>
    </div>

    <div class="absolute inset-0 flex items-center justify-between px-16 pointer-events-none">
        <div class="w-[820px] h-[461px] border-2 border-white/5 rounded-2xl relative shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div class="absolute -bottom-16 left-0">
                <div class="glass-panel px-6 py-3 rounded-tr-2xl rounded-bl-xl neon-border-g">
                    <span id="player1_name" class="text-white text-2xl font-bold italic uppercase tracking-tighter">PLAYER 1 NAME</span>
                </div>
            </div>
        </div>

        <div class="text-6xl font-black italic text-white/10 select-none">VS</div>

        <div class="w-[820px] h-[461px] border-2 border-white/5 rounded-2xl relative shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div class="absolute -bottom-16 right-0">
                <div class="glass-panel px-6 py-3 rounded-tl-2xl rounded-br-xl neon-border-b text-right">
                    <span id="player2_name" class="text-white text-2xl font-bold italic uppercase tracking-tighter">PLAYER 2 NAME</span>
                </div>
            </div>
        </div>
    </div>

    <div class="absolute bottom-0 left-0 w-full px-12 pb-6 flex justify-between items-end">
        <div class="text-white/40 text-xs font-medium tracking-widest uppercase">
            Powered by <span class="text-white/80">RecNest</span>
        </div>
        
        <div class="glass-panel px-8 py-1 rounded-t-lg text-[10px] text-[#39FF14]/80 uppercase tracking-[0.5em]">
            Waiting for players to connect feeds...
        </div>

        <div class="text-white/40 text-xs font-medium tracking-widest uppercase text-right">
            Dev by <span class="text-white/80">Recbuilder</span>
        </div>
    </div>

    <script>
        // Logic to pull Match Data from URL Params
        // URL Example: index.html?p1=Fardin&p2=Rifat&slot=005
        const params = new URLSearchParams(window.location.search);
        
        if(params.get('p1')) document.getElementById('player1_name').innerText = params.get('p1');
        if(params.get('p2')) document.getElementById('player2_name').innerText = params.get('p2');
        if(params.get('slot')) document.getElementById('match_id').innerText = "Slot #" + params.get('slot');

        // You can later add Firebase code here to auto-update these 
        // without refreshing the OBS source!
    </script>
</body>
</html>
