<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecArena | Cyber-Glitch Broadcast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Orbitron', sans-serif; 
            background: transparent; 
            overflow: hidden; 
            width: 1920px; 
            height: 1080px; 
            color: white;
        }

        /* The Dark Glitch Aesthetic */
        .cyber-bg {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(255, 0, 0, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .accent-red { color: #FF4141; text-shadow: 0 0 10px rgba(255, 65, 65, 0.5); }
        .border-red { border: 2px solid #FF4141; }

        /* Glitch Animation for Labels */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .glitch-hover:hover { animation: glitch 0.3s linear infinite; }

        .stat-box {
            background: rgba(255, 65, 65, 0.1);
            border-left: 3px solid #FF4141;
            padding: 4px 12px;
        }
    </style>
</head>
<body class="relative">

    <div class="absolute top-0 w-full flex justify-between items-start px-10 pt-6 pointer-events-none">
        <div class="cyber-bg p-4 rounded-sm border-b-4 border-[#FF4141]">
            <h1 class="text-3xl font-black italic tracking-tighter">REC<span class="accent-red">ARENA</span></h1>
            <p class="text-[9px] text-white/40 uppercase tracking-[0.4em] mt-1">Production Engine // Red Protocol</p>
        </div>

        <div class="flex gap-4 mt-2">
            <div class="cyber-bg px-4 py-2 rounded-sm flex items-center gap-3 border border-white/5 glitch-hover">
                <span class="text-[10px] text-white/40 uppercase font-bold">Youtube</span>
                <span class="text-xs accent-red uppercase">RecShop BD</span>
            </div>
            <div class="cyber-bg px-4 py-2 rounded-sm flex items-center gap-3 border border-white/5 glitch-hover">
                <span class="text-[10px] text-white/40 uppercase font-bold">Facebook</span>
                <span class="text-xs accent-red uppercase">Recbuilder</span>
            </div>
        </div>
    </div>

    <div class="absolute inset-0 flex items-center justify-center px-4 mt-20 pointer-events-none">
        <div class="w-[1880px] h-[529px] flex items-stretch border border-white/10 shadow-2xl bg-black/20">
            
            <div class="w-full h-full relative border-r border-white/10">
                <div class="absolute top-0 left-0 stat-box rounded-br-lg">
                    <span class="text-[10px] uppercase tracking-widest font-bold">Signal: P1_POV</span>
                </div>
            </div>

            <div class="w-full h-full relative">
                <div class="absolute top-0 right-0 stat-box rounded-bl-lg border-l-0 border-r-3 border-[#FF4141]">
                    <span class="text-[10px] uppercase tracking-widest font-bold">Signal: P2_POV</span>
                </div>
            </div>

        </div>
    </div>

    <div class="absolute bottom-0 w-full px-10 pb-6 flex justify-between items-end pointer-events-none">
        
        <div class="flex flex-col gap-2">
            <div class="stat-box w-64">
                <p class="text-[9px] text-white/50 uppercase">Latest Subscriber</p>
                <p class="text-sm font-bold accent-red">Waiting for Feed...</p>
            </div>
            <div class="stat-box w-64">
                <p class="text-[9px] text-white/50 uppercase">Latest Member</p>
                <p class="text-sm font-bold accent-red">None Active</p>
            </div>
        </div>

        <div class="cyber-bg px-12 py-2 rounded-t-xl border-x border-white/5">
            <p class="text-[10px] tracking-[0.5em] text-[#FF4141] font-bold uppercase animate-pulse">
                Architecting the Future of BD Esports Infrastructure
            </p>
        </div>

        <div class="flex flex-col items-end gap-1">
            <div class="cyber-bg px-6 py-2 rounded-sm border-r-4 border-[#FF4141]">
                <p class="text-[9px] text-white/30 text-right uppercase">System Dev</p>
                <h2 class="text-xl font-bold tracking-tighter">REC<span class="accent-red">BUILDER</span></h2>
            </div>
            <p class="text-[8px] text-white/20 uppercase tracking-widest mt-1">Powered by RecShop BD</p>
        </div>
    </div>

</body>
</html>
