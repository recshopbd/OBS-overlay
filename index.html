<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecArena | Alpha Broadcast Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Changa', sans-serif; background: transparent; overflow: hidden; width: 1920px; height: 1080px; }
        
        /* High-tech glass panels with sharp borders */
        .glass-panel {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Neon green shadow effect */
        .neon-g { box-shadow: 0 0 20px rgba(57, 255, 20, 0.3); }
        .neon-g-border { border-left: 5px solid #39FF14; }
        
        /* Neon blue shadow effect */
        .neon-b { box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }
        .neon-b-border { border-right: 5px solid #00E5FF; }

        /* Status pulse animation */
        .pulse { animation: pulse-animation 1.5s infinite; }
        @keyframes pulse-animation { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="relative">

    <div class="absolute top-0 left-0 w-full px-12 pt-6 flex justify-between items-center pointer-events-none">
        
        <div class="glass-panel p-5 rounded-2xl neon-g neon-g-border">
            <h1 class="text-white text-3xl font-extrabold tracking-tighter">REC<span class="text-[#39FF14]">ARENA</span></h1>
            <p class="text-[10px] text-white/50 uppercase tracking-[0.3em]">Broadcast Active</p>
        </div>

        <div class="glass-panel px-10 py-3 rounded-full flex items-center gap-4 border border-white/5 shadow-xl">
            <div class="w-4 h-4 bg-red-600 rounded-full pulse"></div>
            <span class="text-white font-extrabold tracking-widest uppercase text-base">Live Tournament</span>
        </div>

        <div class="w-64"></div>
    </div>

    <div class="absolute inset-0 flex items-center justify-center gap-10 px-14 pointer-events-none">
        
        <div class="w-[830px] h-[467px] border-2 border-[#39FF14]/10 rounded-lg shadow-[0_0_60px_rgba(0,0,0,0.6)] relative">
             <div class="absolute inset-0 bg-transparent rounded-lg"></div> </div>

        <div class="text-7xl font-extrabold italic text-white/10 select-none animate-pulse">VS</div>

        <div class="w-[830px] h-[467px] border-2 border-[#00E5FF]/10 rounded-lg shadow-[0_0_60px_rgba(0,0,0,0.6)] relative">
             <div class="absolute inset-0 bg-transparent rounded-lg"></div> </div>
    </div>

    <div class="absolute bottom-0 left-0 w-full px-12 pb-6 flex justify-between items-end text-sm uppercase tracking-[0.2em] font-medium pointer-events-none">
        
        <div class="glass-panel px-6 py-2 rounded-xl text-white/50 neon-g">
             Powered by <span class="text-white/90">RecShop BD</span>
        </div>

        <div class="glass-panel px-6 py-2 rounded-xl text-white/50 neon-b">
             Dev by <span class="text-white/90">Recbuilder</span>
        </div>
    </div>

</body>
</html>
