<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecArena | Ultra-Wide Gaming Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Orbitron', sans-serif; 
            background: transparent; 
            overflow: hidden; 
            width: 1920px; 
            height: 1080px; 
            color: white;
        }
        
        /* The Cyber-Grid Background (Very subtle) */
        .cyber-grid {
            background-image: linear-gradient(rgba(57, 255, 20, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(57, 255, 20, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(20,20,20,0.8) 100%);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Aggressive Glowing Borders */
        .frame-green { border: 3px solid #39FF14; box-shadow: 0 0 30px rgba(57, 255, 20, 0.4), inset 0 0 20px rgba(57, 255, 20, 0.2); }
        .frame-blue { border: 3px solid #00E5FF; box-shadow: 0 0 30px rgba(0, 229, 255, 0.4), inset 0 0 20px rgba(0, 229, 255, 0.2); }

        .neon-text-green { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
        .neon-text-blue { color: #00E5FF; text-shadow: 0 0 10px #00E5FF; }

        .pulse-red { animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.4; transform: scale(0.9); } to { opacity: 1; transform: scale(1.1); } }
    </style>
</head>
<body class="relative cyber-grid">

    <div class="absolute top-0 w-full flex justify-between items-center px-10 pt-4 pointer-events-none">
        <div class="glass-panel px-8 py-3 rounded-tr-3xl rounded-bl-3xl border-l-4 border-[#39FF14]">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Rec<span class="neon-text-green">Arena</span></h1>
        </div>

        <div class="glass-panel px-10 py-2 rounded-full border border-white/10 flex items-center gap-3">
            <div class="w-3 h-3 bg-red-600 rounded-full pulse-red shadow-[0_0_10px_red]"></div>
            <span class="text-xs tracking-[0.4em] font-bold uppercase">System: Live Broadcast</span>
        </div>

        <div class="w-48"></div> </div>

    <div class="absolute inset-0 flex items-center justify-center gap-6 px-8 mt-10 pointer-events-none">
        
        <div class="w-[900px] h-[506px] frame-green rounded-sm relative bg-black/20">
            <div class="absolute top-2 left-2 px-3 py-1 bg-black/60 text-[10px] border border-[#39FF14]/30 uppercase tracking-widest">Signal: Stable</div>
        </div>

        <div class="flex flex-col items-center gap-2">
            <div class="h-24 w-[2px] bg-gradient-to-b from-transparent via-[#39FF14] to-transparent"></div>
            <div class="text-5xl font-black italic skew-x-[-15deg] neon-text-blue">VS</div>
            <div class="h-24 w-[2px] bg-gradient-to-b from-transparent via-[#00E5FF] to-transparent"></div>
        </div>

        <div class="w-[900px] h-[506px] frame-blue rounded-sm relative bg-black/20">
            <div class="absolute top-2 right-2 px-3 py-1 bg-black/60 text-[10px] border border-[#00E5FF]/30 uppercase tracking-widest">Signal: Stable</div>
        </div>
    </div>

    <div class="absolute bottom-0 w-full flex justify-between items-end px-10 pb-4 pointer-events-none">
        
        <div class="glass-panel px-6 py-2 rounded-lg border-b-2 border-[#39FF14]">
            <p class="text-[10px] text-white/40 tracking-widest uppercase">Powered by</p>
            <h3 class="text-lg font-bold tracking-tighter italic">RecShop <span class="neon-text-green">BD</span></h3>
        </div>

        <div class="mb-2 glass-panel px-12 py-1 rounded-t-2xl border-x border-white/5">
            <marquee class="w-64 text-[10px] text-[#39FF14] tracking-[0.3em] font-bold uppercase">
                Welcome to the Arena // Book your slot at recarena.live // Professional Tournament Hosting
            </marquee>
        </div>

        <div class="glass-panel px-6 py-2 rounded-lg border-b-2 border-[#00E5FF] text-right">
            <p class="text-[10px] text-white/40 tracking-widest uppercase">Dev by</p>
            <h3 class="text-lg font-bold tracking-tighter italic">Rec<span class="neon-text-blue">builder</span></h3>
        </div>
    </div>

</body>
</html>
