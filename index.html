<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecArena | Shadow Protocol Broadcast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Changa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Orbitron', sans-serif; 
            background: transparent; 
            overflow: hidden; 
            width: 1920px; 
            height: 1080px; 
            color: #ffffff;
        }

        /* Deep Matte-Black Glass */
        .glass-dark {
            background: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
        }

        /* Tactical Neon Accents */
        .neon-green { color: #39FF14; text-shadow: 0 0 15px rgba(57, 255, 20, 0.6); }
        .neon-blue { color: #00E5FF; text-shadow: 0 0 15px rgba(0, 229, 255, 0.6); }

        .frame-p1 { border: 2px solid #39FF14; box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.1), 0 0 40px rgba(0,0,0,0.8); }
        .frame-p2 { border: 2px solid #00E5FF; box-shadow: inset 0 0 30px rgba(0, 229, 255, 0.1), 0 0 40px rgba(0,0,0,0.8); }

        /* Scanning Line Animation */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            position: absolute;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
    </style>
</head>
<body class="relative">

    <div class="absolute top-0 w-full flex justify-between items-start px-12 pt-8 pointer-events-none">
        <div class="glass-dark p-6 rounded-br-3xl border-l-4 border-[#39FF14] shadow-2xl">
            <h1 class="text-4xl font-black italic tracking-tighter">REC<span class="neon-green">ARENA</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <div class="w-2 h-2 bg-[#39FF14] rounded-full animate-pulse"></div>
                <p class="font-['Changa'] text-[10px] text-white/40 uppercase tracking-[0.4em]">Broadcast Engine v3.0</p>
            </div>
        </div>

        <div class="glass-dark px-10 py-3 rounded-full border border-white/5 flex items-center gap-4">
            <span class="text-red-600 animate-pulse font-black text-xs">● LIVE</span>
            <div class="w-[1px] h-4 bg-white/20"></div>
            <span class="font-['Changa'] text-xs tracking-[0.3em] font-bold">1080P // 60FPS // LOW LATENCY</span>
        </div>

        <div class="w-64"></div> </div>

    <div class="absolute inset-0 flex items-center justify-center gap-4 px-6 pointer-events-none">
        
        <div class="w-[920px] h-[517px] frame-p1 bg-black relative rounded-sm overflow-hidden">
            <div class="scanline"></div>
            <div class="absolute top-0 left-0 bg-[#39FF14] text-black text-[10px] px-3 font-bold">POV_01 // SIGNAL_STABLE</div>
        </div>

        <div class="flex flex-col items-center gap-4">
            <div class="h-32 w-[1px] bg-gradient-to-b from-transparent via-white/20 to-transparent"></div>
            <div class="text-6xl font-black italic skew-x-[-12deg] neon-blue drop-shadow-2xl">VS</div>
            <div class="h-32 w-[1px] bg-gradient-to-b from-transparent via-white/20 to-transparent"></div>
        </div>

        <div class="w-[920px] h-[517px] frame-p2 bg-black relative rounded-sm overflow-hidden">
            <div class="scanline"></div>
            <div class="absolute top-0 right-0 bg-[#00E5FF] text-black text-[10px] px-3 font-bold">POV_02 // SIGNAL_STABLE</div>
        </div>
    </div>

    <div class="absolute bottom-0 w-full flex justify-between items-end px-12 pb-8 pointer-events-none font-['Changa']">
        
        <div class="glass-dark p-5 rounded-xl border-t-2 border-[#39FF14] flex flex-col gap-1">
            <span class="text-[10px] text-white/30 tracking-[0.3em]">OPERATED BY</span>
            <h2 class="text-2xl font-bold tracking-tighter text-white">RECSHOP <span class="neon-green">BD</span></h2>
        </div>

        <div class="glass-dark px-16 py-2 rounded-t-3xl border-x border-white/5">
            <p class="text-[11px] text-[#39FF14]/70 tracking-[0.5em] font-bold uppercase whitespace-nowrap overflow-hidden">
                ARCHITECTING THE FUTURE OF BD ESPORTS // NEXT MATCH IN T-MINUS 15:00
            </p>
        </div>

        <div class="glass-dark p-5 rounded-xl border-t-2 border-[#00E5FF] text-right flex flex-col gap-1">
            <span class="text-[10px] text-white/30 tracking-[0.3em]">ENGINEERED BY</span>
            <h2 class="text-2xl font-bold tracking-tighter text-white">REC<span class="neon-blue">BUILDER</span></h2>
        </div>
    </div>

</body>
</html>
